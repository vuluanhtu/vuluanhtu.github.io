<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Snake_Solo_Run</title>
    
    <script src="bridge.js"></script>
    <script src="bridge.console.js"></script>
    <script src="bridge.meta.js"></script>
    <script src="newtonsoft.json.js"></script>
    <script src="Snake%20Solo%20Run.js"></script>
    <script src="Snake%20Solo%20Run.meta.js"></script>
</head>
<body>
	<button id="BUTTON" >Initialize</button> Score:<span id = "score"></span>
	<div id = "elements">
		<canvas id="gc0" width= "400" height= "400"></canvas> <!-- canvas tag is used to create a box to draw object inside it-->
	</div>
	<script>
		var _pollInterval = null;
		document.getElementById('BUTTON').addEventListener('click', function() {
			var btn = document.getElementById('BUTTON');
			btn.disabled = true;
			btn.textContent = 'Running...';
			_pollInterval = setInterval(function() {
				var app = Snake_Solo_Run && Snake_Solo_Run.App && Snake_Solo_Run.App.Tu;
				if (app && app.snake && app.snake.die === 1) {
					clearInterval(_pollInterval);
					btn.disabled = false;
					btn.textContent = 'Play Again';
				}
			}, 200);
		});
	</script>
</body>
</html>
