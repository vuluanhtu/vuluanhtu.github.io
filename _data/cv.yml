        summary: Lead design and development of Ground Support Equipment, Agricultural Machinery, Waste Management Systems, and Grease Containment Systems, managing projects from concept through production.
        highlights:
          - "Product Innovation & IP: Authored documentation for 1 pending patent by developing novel GSE assembly mechanism for national airports, reducing setup time by 4x and shipping cost by 3x for customers."
          - "Systems Integration: Led the mechanical, hydraulic, and electrical integration for complex mobile units ($20k+ units). Managed top-down assemblies with 1000+ unique components and their full BOMs (Bill of Materials)."
          - "Design for Excellence (DFX): Consolidated 50+ bespoke assemblies into 1 high-efficiency modular platform, reducing production complexity and increasing part commonality across GSE Lavatory and Potable Water Service Carts."
          - "Validation & First Principles: Utilized ANSYS/SolidWorks Simulation to conduct structural and fatigue analysis (FEA), reducing physical prototyping cycles by 50%."
          - "Precision Documentation & Quality: Directed the Engineering Change Notice (ECN) process within an ERP (Visual) environment, ensuring 100% data integrity, optimizing material disposition, and analyzing inventory impact to ensure seamless production transitions and minimal scrap."
          - "DFM/DFA Optimization: Led Cross-functional Design Reviews using DFM/DFA analysis, maintaining downstream fabrication errors below 5% and eliminating the need for manual shop-floor rework."
          - "Cross-Functional Leadership: Partnered with Manufacturing, Sales and Purchasing to generate high-accuracy cost models and presented technical product roadmaps at major national trade shows (PWX, GSE Expo)."

